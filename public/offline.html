<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>離線中 · Gencko Studio</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/zzes50708/gencko-assets@main/img/11.png" />
  <style>
    :root {
      --pri: #E8440A;
      --bg: #18120E;
      --txt: #f1ece6;
      --card: rgba(255,255,255,0.04);
      --bd: rgba(255,255,255,0.12);
    }
    @media (prefers-color-scheme: light) {
      :root { --bg: #e6e3e3; --txt: #1d1410; --card: rgba(0,0,0,0.03); --bd: rgba(0,0,0,0.12); }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      background: var(--bg); color: var(--txt);
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 560px; margin: 0 auto;
      padding: 100px 24px 60px 24px; text-align: center;
    }
    .icon {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--bd);
      margin: 0 auto 24px auto;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    h1 { font-size: 1.6rem; font-weight: 900; margin: 0 0 12px 0; }
    p { font-size: 0.95rem; line-height: 1.7; opacity: 0.8; margin: 0 0 8px 0; }
    .status {
      display: inline-block; margin-top: 18px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 0.8rem; font-weight: bold;
      background: rgba(232, 68, 10, 0.12);
      color: var(--pri);
      border: 1px solid rgba(232, 68, 10, 0.3);
    }
    .status.online {
      background: rgba(40, 180, 90, 0.15);
      color: #2eb464;
      border-color: rgba(40, 180, 90, 0.35);
    }
    .actions {
      display: flex; gap: 10px; flex-wrap: wrap;
      justify-content: center; margin-top: 28px;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 140px; padding: 11px 22px;
      border-radius: 999px;
      border: 1px solid var(--bd);
      background: transparent; color: var(--txt);
      font-size: 0.95rem; font-weight: bold; cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, background 0.15s, border-color 0.15s;
    }
    .btn:hover { transform: translateY(-1px); border-color: var(--pri); color: var(--pri); }
    .btn.primary {
      background: var(--pri); color: #fff; border-color: var(--pri);
      box-shadow: 0 8px 24px rgba(232, 68, 10, 0.35);
    }
    .btn.primary:hover { color: #fff; opacity: 0.92; }
    .tip { font-size: 0.85rem; opacity: 0.6; margin-top: 30px; }
    @media (max-width: 480px) {
      .wrap { padding: 70px 18px 40px 18px; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon" aria-hidden="true">🦎</div>
    <h1>目前處於離線狀態</h1>
    <p>看起來網路斷了一下。已快取的頁面仍可瀏覽，未快取的內容請等網路恢復後再試。</p>
    <div id="status" class="status">📡 等待網路連線…</div>

    <div class="actions">
      <button id="retry" type="button" class="btn primary">重新整理</button>
      <a href="/" class="btn">回到首頁</a>
    </div>

    <p class="tip">提示：把 Gencko 加入主畫面後，下次離線開啟更穩定。</p>
  </div>

  <script>
    (function () {
      var statusEl = document.getElementById('status');
      var retryBtn = document.getElementById('retry');

      function refreshStatus() {
        if (navigator.onLine) {
          statusEl.textContent = '✅ 網路已恢復，可重新整理';
          statusEl.classList.add('online');
        } else {
          statusEl.textContent = '📡 等待網路連線…';
          statusEl.classList.remove('online');
        }
      }
      window.addEventListener('online', refreshStatus);
      window.addEventListener('offline', refreshStatus);
      refreshStatus();

      retryBtn.addEventListener('click', function () {
        // 若先前是被導向 offline.html，按下重試會回到原本想去的網址
        if (document.referrer && document.referrer.indexOf(location.origin) === 0 && document.referrer !== location.href) {
          location.href = document.referrer;
        } else {
          location.reload();
        }
      });
    })();
  </script>
</body>
</html>
