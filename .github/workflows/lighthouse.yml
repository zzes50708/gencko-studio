name: Lighthouse CI

# 觸發：Vercel preview 部署成功時，對 preview URL 跑 Lighthouse
# 設計：監聽 GitHub 的 deployment_status 事件（Vercel 整合會 push 這個事件）
# 對主要頁面跑 mobile + desktop 各一輪，分數退步 → PR 留評論
on:
  deployment_status:

jobs:
  lighthouse:
    # 只有 Vercel preview 部署成功時才跑（忽略 production 與失敗事件）
    if: >
      github.event.deployment_status.state == 'success' &&
      contains(github.event.deployment.environment, 'Preview')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse (mobile)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ github.event.deployment_status.target_url }}
            ${{ github.event.deployment_status.target_url }}/articles
            ${{ github.event.deployment_status.target_url }}/shop
            ${{ github.event.deployment_status.target_url }}/calculator
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.github/lighthouse/lhci.json

      - name: Comment results on PR
        if: always() && github.event.deployment.payload.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pr = ${{ github.event.deployment.payload.pr_number || 0 }}
            if (!pr) return
            const body = [
              '## 🔦 Lighthouse CI',
              '',
              `Preview: ${{ github.event.deployment_status.target_url }}`,
              '',
              '報告 artifact 已上傳，可在 Actions 頁面下載 HTML；temporaryPublicStorage 連結也已產生（24h 後過期）。',
              '若分數低於 [.github/lighthouse/lhci.json](.github/lighthouse/lhci.json) 設定的下限，本 job 會 fail 並擋住 PR。'
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body
            })
