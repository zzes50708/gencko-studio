project_id = "gencko-studio"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://www.genckobreeding.com"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# 既有 edge function：競標結束時自動結算
[functions.end-auction]
verify_jwt = false

[experimental]
orioledb_version = ""
s3_host = "env(SUPABASE_S3_HOST)"
s3_region = "env(SUPABASE_S3_REGION)"
s3_access_key = "env(SUPABASE_S3_ACCESS_KEY)"
s3_secret_key = "env(SUPABASE_S3_SECRET_KEY)"
